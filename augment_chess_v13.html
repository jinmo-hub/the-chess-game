<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUGMENT CHESS - Professional V13.0</title>
    <style>
        :root {
            --bg-color: #0e0e12;
            --panel-color: #1a1a24;
            --accent-color: #00ff96;
            --text-color: #e0e0e0;
            --board-dark: #2a2a35;
            --board-light: #3f3f4d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            display: flex;
            gap: 0;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        canvas {
            background-color: #000;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .augment-card {
            background: #1f1f2e;
            border: 1px solid #333;
            padding: 20px;
            margin: 10px;
            width: 260px;
            min-height: 180px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .augment-card:hover {
            border-color: var(--accent-color);
            background: #25253a;
            transform: scale(1.02);
        }

        .card-title {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 15px;
            word-break: keep-all;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #bbb;
            line-height: 1.4;
            word-break: keep-all;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="overlay">
        <h2 style="color: var(--accent-color); margin-bottom: 20px; letter-spacing: 2px;">증강 선택 (AUGMENT SELECTION)</h2>
        <div id="card-list" style="display: flex; flex-wrap: wrap; justify-content: center;"></div>
    </div>
</div>

<script>
/**
 * AUGMENT CHESS - Professional V13.0
 * Original Logic Preservation Version
 */

const BOARD_SIZE = 640;
const SIDE_WIDTH = 250;
const WIDTH = BOARD_SIZE + SIDE_WIDTH * 2;
const HEIGHT = BOARD_SIZE;
const CELL = BOARD_SIZE / 8;

const PIECES = {
    'pw': '♙', 'rw': '♖', 'nw': '♘', 'bw': '♗', 'qw': '♕', 'kw': '♔',
    'pb': '♟', 'rb': '♜', 'nb': '♞', 'bb': '♝', 'qb': '♛', 'kb': '♚'
};

// 원본 증강 풀 (사용자 제공 리스트 100% 유지)
const AUGMENT_POOL = [
    {"id": "apfsds", "name": "열화우라늄날개안정분리철갑탄", "desc": "비숍 이동 시 주변 1칸 적/아군 삭제(킹 제외) 후 비숍 사망"},
    {"id": "descendant_of_khan", "name": "칸의 후예", "desc": "비숍이 나이트로 변경. 킹이 나이트의 행마법 획득"},
    {"id": "true_king", "name": "진정한 왕은 누구인가?", "desc": "퀸 삭제. 킹이 퀸의 행마법 획득"},
    {"id": "colossus", "name": "체크메이트의 거신병", "desc": "내 모든 폰 전멸 시 d열 1행에 퀸 소환"},
    {"id": "chess960", "name": "체스 960", "desc": "내 기물(폰/킹 제외)의 위치를 무작위로 뒤섞음"},
    {"id": "road_to_heaven", "name": "천국에 가는 길", "desc": "다음 증강 선택 시 확정으로 '중력 반전' 등장"},
    {"id": "undo_master", "name": "Undo!", "desc": "되돌리기 무제한 활성화"},
    {"id": "pawn_front_line", "name": "전방 전선", "desc": "모든 폰 1칸 전진(기물 삭제, 킹 제외)"},
    {"id": "knight_slayer", "name": "초살병기 나이트", "desc": "나이트에게 룩의 행마 추가"},
    {"id": "pawn_world_nerfed", "name": "쇼킹 폰 월드", "desc": "상대 무작위 기물 3개를 폰으로 변환"},
    {"id": "time_stop", "name": "시간 정지", "desc": "3턴간 나만 행동 (킹 전용 무적 이동 가능)"},
    {"id": "pawn_side", "name": "졸병 진화", "desc": "폰이 좌우로도 이동 가능"},
    {"id": "knight_bishop", "name": "결전병기 나이트", "desc": "나이트가 비숍처럼 대각선 이동 가능"},
    {"id": "bishop_sniper", "name": "저격 비숍", "desc": "비숍이 기물을 뛰어넘어 공격 가능"},
    {"id": "meteor_strike", "name": "메테오 스트라이크", "desc": "룩이 기물을 관통하여 뒤까지 공격"},
    {"id": "kings_attack", "name": "킹스 어택", "desc": "킹이 대각선 2칸 위치로 도약 가능"},
    {"id": "necromancy", "name": "네크로맨시", "desc": "킹 이동 불가, 대신 주변 빈 공간에 폰 소환 가능"},
    {"id": "gravity_flip", "name": "중력 반전", "desc": "내 폰들의 전진 방향이 반대로 변경됨"},
    {"id": "royal_guard", "name": "로열 가드", "desc": "킹 주변 8칸의 아군 기물은 잡히지 않음"}
];

class ChessGame {
    constructor() {
        this.board = Array(8).fill(null).map(() => Array(8).fill(null));
        this.turn = 'w';
        this.history = [];
        this.moveLog = [];
        this.activeAugments = { w: new Set(), b: new Set() };
        this.gravityInverted = { w: false, b: false };
        this.heavenTrigger = { w: false, b: false };
        this.timeStopTurns = 0;
        this.initBoard();
    }

    initBoard() {
        const layout = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
        for (let i = 0; i < 8; i++) {
            this.board[0][i] = layout[i] + 'b';
            this.board[1][i] = 'p' + 'b';
            this.board[6][i] = 'p' + 'w';
            this.board[7][i] = layout[i] + 'w';
        }
    }

    getPiece(r, c) {
        if (r < 0 || r >= 8 || c < 0 || c >= 8) return null;
        return this.board[r][c];
    }

    isValidMove(r, c, tr, tc, ignoreCheck = false) {
        const piece = this.getPiece(r, c);
        if (!piece) return false;
        const type = piece[0];
        const color = piece[1];
        const target = this.getPiece(tr, tc);

        if (target && target[1] === color) {
            // 차원 도약 등의 특수 능력이 없다면 아군 공격 불가
            return false;
        }

        const dr = tr - r;
        const dc = tc - c;
        let pDir = color === 'w' ? -1 : 1;
        if (this.gravityInverted[color]) pDir *= -1;

        // --- 각 기물별 특수 행마 로직 (증강 반영) ---
        switch (type) {
            case 'p':
                // 졸병 진화: 좌우 이동 가능
                if (this.activeAugments[color].has('pawn_side')) {
                    if (dr === 0 && Math.abs(dc) === 1 && !target) return true;
                }
                // 일반 이동
                if (dc === 0 && !target) {
                    if (dr === pDir) return true;
                    if (dr === pDir * 2 && r === (color === 'w' ? 6 : 1)) return !this.getPiece(r + pDir, c);
                }
                // 공격
                if (Math.abs(dc) === 1 && dr === pDir && target) return true;
                break;

            case 'n':
                const isL = (Math.abs(dr) === 2 && Math.abs(dc) === 1) || (Math.abs(dr) === 1 && Math.abs(dc) === 2);
                if (isL) return true;
                // 초살병기 나이트: 룩의 행마 추가
                if (this.activeAugments[color].has('knight_slayer')) {
                    if ((dr === 0 || dc === 0) && this.isPathClear(r, c, tr, tc)) return true;
                }
                // 결전병기 나이트: 비숍의 행마 추가
                if (this.activeAugments[color].has('knight_bishop')) {
                    if (Math.abs(dr) === Math.abs(dc) && this.isPathClear(r, c, tr, tc)) return true;
                }
                break;

            case 'r':
                if (dr === 0 || dc === 0) {
                    // 메테오 스트라이크: 관통 가능 (PathClear 무시)
                    if (this.activeAugments[color].has('meteor_strike')) return true;
                    return this.isPathClear(r, c, tr, tc);
                }
                break;

            case 'b':
                if (Math.abs(dr) === Math.abs(dc)) {
                    // 저격 비숍: 관통 가능
                    if (this.activeAugments[color].has('bishop_sniper')) return true;
                    return this.isPathClear(r, c, tr, tc);
                }
                break;

            case 'q':
                if (dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc)) return this.isPathClear(r, c, tr, tc);
                break;

            case 'k':
                // 네크로맨시: 킹 이동 불가
                if (this.activeAugments[color].has('necromancy')) return false;
                
                const dist = Math.max(Math.abs(dr), Math.abs(dc));
                if (dist === 1) return true;
                
                // 킹스 어택: 대각선 2칸 도약
                if (this.activeAugments[color].has('kings_attack')) {
                    if (Math.abs(dr) === 2 && Math.abs(dc) === 2) return true;
                }
                // 칸의 후예 / 진정한 왕은 누구인가: 나이트/퀸 행마 획득
                if (this.activeAugments[color].has('descendant_of_khan')) {
                    if ((Math.abs(dr) === 2 && Math.abs(dc) === 1) || (Math.abs(dr) === 1 && Math.abs(dc) === 2)) return true;
                }
                if (this.activeAugments[color].has('true_king')) {
                    if ((dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc)) && this.isPathClear(r, c, tr, tc)) return true;
                }
                break;
        }
        return false;
    }

    isPathClear(r, c, tr, tc) {
        const dr = Math.sign(tr - r);
        const dc = Math.sign(tc - c);
        let cr = r + dr;
        let cc = c + dc;
        while (cr !== tr || cc !== tc) {
            if (this.board[cr][cc]) return false;
            cr += dr;
            cc += dc;
        }
        return true;
    }

    applyAugment(color, augId) {
        this.activeAugments[color].add(augId);
        const opp = color === 'w' ? 'b' : 'w';

        switch (augId) {
            case 'gravity_flip':
                this.gravityInverted[color] = !this.gravityInverted[color];
                break;
            case 'road_to_heaven':
                this.heavenTrigger[color] = true;
                break;
            case 'chess960':
                this.shufflePieces(color);
                break;
            case 'true_king':
                this.removePieceType('q', color);
                break;
            case 'pawn_world_nerfed':
                this.transformToPawn(opp, 3);
                break;
            case 'pawn_front_line':
                this.advancePawns(color);
                break;
            case 'descendant_of_khan':
                this.transformPieceType('b', 'n', color);
                break;
            case 'time_stop':
                this.timeStopTurns = 3;
                break;
        }
    }

    // --- 세부 효과 구현 ---
    shufflePieces(color) {
        let positions = [];
        let pieces = [];
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                let p = this.board[r][c];
                if (p && p[1] === color && p[0] !== 'p' && p[0] !== 'k') {
                    positions.push({r, c});
                    pieces.push(p);
                    this.board[r][c] = null;
                }
            }
        }
        pieces.sort(() => Math.random() - 0.5);
        positions.forEach((pos, i) => this.board[pos.r][pos.c] = pieces[i]);
    }

    removePieceType(type, color) {
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                if (this.board[r][c] === type + color) this.board[r][c] = null;
            }
        }
    }

    transformPieceType(from, to, color) {
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                if (this.board[r][c] === from + color) this.board[r][c] = to + color;
            }
        }
    }

    transformToPawn(color, count) {
        let targets = [];
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                let p = this.board[r][c];
                if (p && p[1] === color && p[0] !== 'k') targets.push({r, c});
            }
        }
        targets.sort(() => Math.random() - 0.5).slice(0, count).forEach(t => {
            this.board[t.r][t.c] = 'p' + color;
        });
    }

    advancePawns(color) {
        const dir = color === 'w' ? -1 : 1;
        for (let r = (color === 'w' ? 0 : 7); color === 'w' ? r < 8 : r >= 0; color === 'w' ? r++ : r--) {
            for (let c = 0; c < 8; c++) {
                if (this.board[r][c] === 'p' + color) {
                    let tr = r + dir;
                    if (tr >= 0 && tr < 8) {
                        if (!this.board[tr][c] || this.board[tr][c][0] !== 'k') {
                            this.board[tr][c] = 'p' + color;
                            this.board[r][c] = null;
                        }
                    }
                }
            }
        }
    }
}

class GameUI {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = WIDTH;
        this.canvas.height = HEIGHT;
        this.game = new ChessGame();
        this.selected = null;
        this.validMoves = [];
        this.lastMove = null;
        this.state = 'GAME'; // GAME, SELECT

        this.canvas.addEventListener('mousedown', (e) => this.handleClick(e));
        this.update();
    }

    handleClick(e) {
        if (this.state !== 'GAME') return;
        const rect = this.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left - SIDE_WIDTH;
        const y = e.clientY - rect.top;

        if (x < 0 || x >= BOARD_SIZE) return;
        const c = Math.floor(x / CELL);
        const r = Math.floor(y / CELL);

        if (this.selected) {
            const move = this.validMoves.find(m => m.r === r && m.c === c);
            if (move) {
                this.executeMove(this.selected.r, this.selected.c, r, c);
            } else {
                this.trySelect(r, c);
            }
        } else {
            this.trySelect(r, c);
        }
    }

    trySelect(r, c) {
        const piece = this.game.getPiece(r, c);
        if (piece && piece[1] === this.game.turn) {
            this.selected = { r, c };
            this.validMoves = [];
            for (let tr = 0; tr < 8; tr++) {
                for (let tc = 0; tc < 8; tc++) {
                    if (this.game.isValidMove(r, c, tr, tc)) {
                        this.validMoves.push({ r: tr, c: tc });
                    }
                }
            }
        }
    }

    executeMove(r, c, tr, tc) {
        const piece = this.game.board[r][c];
        const target = this.game.board[tr][tc];

        // 열화우라늄탄 효과
        if (piece[0] === 'b' && this.game.activeAugments[this.game.turn].has('apfsds')) {
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    let nr = tr + i, nc = tc + j;
                    if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
                        let p = this.game.board[nr][nc];
                        if (p && p[0] !== 'k') this.game.board[nr][nc] = null;
                    }
                }
            }
            this.game.board[r][c] = null;
            this.finishTurn(r, c, tr, tc, piece, true);
            return;
        }

        this.game.board[tr][tc] = piece;
        this.game.board[r][c] = null;

        if (target && target[0] === 'k') {
            alert(`${this.game.turn === 'w' ? 'WHITE' : 'BLACK'} 승리!`);
            location.reload();
        }

        this.finishTurn(r, c, tr, tc, piece);
    }

    finishTurn(r, c, tr, tc, piece, selfDestruct = false) {
        this.lastMove = { fr: r, fc: c, tr, tc };
        this.game.moveLog.push(`${piece.toUpperCase()} ${String.fromCharCode(97+c)}${8-r}→${String.fromCharCode(97+tc)}${8-tr}`);
        this.selected = null;
        this.validMoves = [];

        // 시간 정지 체크
        if (this.game.timeStopTurns > 0) {
            this.game.timeStopTurns--;
        } else {
            this.game.turn = this.game.turn === 'w' ? 'b' : 'w';
        }

        if (this.game.moveLog.length % 8 === 0) {
            this.showAugmentOverlay();
        }
    }

    showAugmentOverlay() {
        this.state = 'SELECT';
        const overlay = document.getElementById('overlay');
        const list = document.getElementById('card-list');
        list.innerHTML = '';
        overlay.style.display = 'flex';

        let pool = [...AUGMENT_POOL];
        // 천국에 가는 길 로직
        if (this.game.heavenTrigger[this.game.turn]) {
            const gv = pool.find(a => a.id === 'gravity_flip');
            const others = pool.filter(a => a.id !== 'gravity_flip').sort(() => Math.random() - 0.5);
            this.renderCards([gv, ...others.slice(0, 2)]);
            this.game.heavenTrigger[this.game.turn] = false;
        } else {
            const selected = pool.sort(() => Math.random() - 0.5).slice(0, 3);
            this.renderCards(selected);
        }
    }

    renderCards(cards) {
        const list = document.getElementById('card-list');
        cards.forEach(aug => {
            const div = document.createElement('div');
            div.className = 'augment-card';
            div.innerHTML = `<div class="card-title">${aug.name}</div><div class="card-desc">${aug.desc}</div>`;
            div.onclick = () => {
                this.game.applyAugment(this.game.turn, aug.id);
                document.getElementById('overlay').style.display = 'none';
                this.state = 'GAME';
            };
            list.appendChild(div);
        });
    }

    draw() {
        const { ctx, canvas } = this;
        ctx.clearRect(0, 0, WIDTH, HEIGHT);

        // 보드 그리기
        ctx.save();
        ctx.translate(SIDE_WIDTH, 0);
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                ctx.fillStyle = (r + c) % 2 === 0 ? '#3f3f4d' : '#2a2a35';
                ctx.fillRect(c * CELL, r * CELL, CELL, CELL);

                if (this.lastMove && ((this.lastMove.tr === r && this.lastMove.tc === c) || (this.lastMove.fr === r && this.lastMove.fc === c))) {
                    ctx.fillStyle = 'rgba(255, 255, 0, 0.15)';
                    ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
                }

                const piece = this.game.board[r][c];
                if (piece) {
                    ctx.fillStyle = piece[1] === 'w' ? '#fff' : '#000';
                    ctx.font = `${CELL * 0.7}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(PIECES[piece], c * CELL + CELL / 2, r * CELL + CELL / 2);
                }
            }
        }

        if (this.selected) {
            ctx.strokeStyle = '#00ff96';
            ctx.lineWidth = 3;
            ctx.strokeRect(this.selected.c * CELL, this.selected.r * CELL, CELL, CELL);
            this.validMoves.forEach(m => {
                ctx.fillStyle = 'rgba(0, 255, 150, 0.3)';
                ctx.beginPath();
                ctx.arc(m.c * CELL + CELL/2, m.r * CELL + CELL/2, CELL/6, 0, Math.PI*2);
                ctx.fill();
            });
        }
        ctx.restore();

        // 패널 그리기
        this.drawSidePanels();
    }

    drawSidePanels() {
        const ctx = this.ctx;
        ctx.fillStyle = '#141419';
        ctx.fillRect(0, 0, SIDE_WIDTH, HEIGHT);
        ctx.fillRect(WIDTH - SIDE_WIDTH, 0, SIDE_WIDTH, HEIGHT);

        ctx.fillStyle = '#00ff96';
        ctx.font = 'bold 22px Malgun Gothic';
        ctx.fillText('AUGMENT CHESS', 25, 45);
        ctx.font = '12px Malgun Gothic';
        ctx.fillText('Professional V13.0', 25, 65);

        ctx.fillStyle = '#fff';
        ctx.font = '16px Malgun Gothic';
        ctx.fillText(`차례: ${this.game.turn === 'w' ? 'WHITE' : 'BLACK'}`, 25, 120);
        if (this.game.timeStopTurns > 0) ctx.fillText(`시간 정지 중! (${this.game.timeStopTurns})`, 25, 145);

        ctx.fillStyle = '#888';
        ctx.fillText('활성화된 증강:', 25, 185);
        let idx = 0;
        this.game.activeAugments[this.game.turn].forEach(id => {
            const name = AUGMENT_POOL.find(a => a.id === id).name;
            ctx.fillStyle = '#00ff96';
            ctx.fillText(`• ${name}`, 35, 215 + idx * 25);
            idx++;
        });

        // 로그
        ctx.fillStyle = '#aaa';
        ctx.fillText('MOVE HISTORY', WIDTH - SIDE_WIDTH + 25, 45);
        this.game.moveLog.slice(-22).forEach((log, i) => {
            ctx.fillText(log, WIDTH - SIDE_WIDTH + 25, 80 + i * 22);
        });
    }

    update() {
        this.draw();
        requestAnimationFrame(() => this.update());
    }
}

window.onload = () => new GameUI();
</script>
</body>
</html>
