<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUGMENT CHESS Web Runner</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        body { 
            background-color: #0e0e12; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            color: #00ff96;
            font-family: 'Malgun Gothic', sans-serif;
        }
        #loading { margin-bottom: 20px; text-align: center; z-index: 10; }
        canvas { 
            box-shadow: 0 0 50px rgba(0,0,0,0.8); 
            border-radius: 4px;
            background-color: #000;
            image-rendering: pixelated; /* 도트 그래픽 보정 */
        }
        .error-box {
            color: #ff4d4d;
            background: rgba(255,0,0,0.1);
            padding: 20px;
            border: 1px solid #ff4d4d;
            border-radius: 8px;
            display: none;
            max-width: 80%;
            white-space: pre-wrap;
            font-family: monospace;
            overflow-y: auto;
            max-height: 400px;
            z-index: 20;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #00ff96;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">AUGMENT CHESS</div>
        <div class="spinner"></div>
        <div id="status">엔진 초기화 중...</div>
    </div>
    <div id="error" class="error-box"></div>
    <canvas id="canvas"></canvas>

    <script type="text/javascript">
        async function runGame() {
            const status = document.getElementById('status');
            const errorBox = document.getElementById('error');
            const loading = document.getElementById('loading');

            try {
                // 1. Pyodide 엔진 로드
                const pyodide = await loadPyodide();
                
                // 2. micropip 설치 및 패키지 강제 로드
                status.innerText = "라이브러리 환경 설정 중...";
                await pyodide.loadPackage("micropip");
                const micropip = pyodide.pyimport("micropip");
                
                status.innerText = "Pygame-CE 설치 중 (시간이 좀 걸릴 수 있습니다)...";
                // Pyodide 공식 저장소에서 pygame-ce를 직접 설치 시도
                try {
                    await micropip.install("pygame-ce");
                } catch (e) {
                    console.warn("pygame-ce 설치 실패, pygame 시도...");
                    await micropip.install("pygame");
                }

                // 3. 파이썬 파일 읽기 (파일명: pygame chess.py)
                status.innerText = "게임 스크립트 불러오는 중...";
                const response = await fetch('pygame chess.py');
                if (!response.ok) throw new Error("'pygame chess.py' 파일을 찾지 못했습니다. 파일명을 확인해 주세요.");
                const pythonCode = await response.text();

                // 4. 실행 래퍼 (기존 코드의 모든 로직 유지)
                const wrapper = `
import asyncio
import pygame
import sys
import io

# 웹 환경 가상 디스플레이 설정
pygame.init()

# 원본 코드 실행
exec_globals = {}
try:
    # 사용자 코드 내의 pygame.init() 등과 충돌하지 않도록 globals 설정
    exec_globals['__name__'] = '__main__'
    exec("""${pythonCode.replace(/\\\\/g, '\\\\\\\\').replace(/"/g, '\\\\\"').replace(/\\$/g, '\\\\$')}""", exec_globals)
except Exception as e:
    import traceback
    print(traceback.format_exc())
    raise e

async def main():
    # GameApp 인스턴스 확인
    if 'GameApp' in exec_globals:
        app = exec_globals['GameApp']()
        
        # 웹용 비동기 메인 루프
        while True:
            # 원본의 draw() 함수 실행
            app.draw()
            pygame.display.flip()
            
            # 이벤트 처리
            for event in pygame.event.get():
                if event.type == pygame.QUIT:
                    return
                # 원본 handle_click 호출
                app.handle_click(event)
            
            # 브라우저 렌더링을 위한 대기
            await asyncio.sleep(0.01) # 약 60FPS 타겟
    else:
        print("Error: 'GameApp' class not found.")

# 비동기 실행 시작
asyncio.ensure_future(main())
`;
                await pyodide.runPythonAsync(wrapper);
                loading.style.display = 'none';

            } catch (err) {
                loading.style.display = 'none';
                errorBox.style.display = 'block';
                errorBox.innerText = "실행 에러 발생:\n" + err.message;
                console.error(err);
            }
        }
        window.onload = runGame;
    </script>
</body>
</html>
