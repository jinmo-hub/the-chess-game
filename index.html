<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUGMENT CHESS - Web Port</title>
    <!-- Pyodide 최신 안정 버전 로드 -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        body { 
            background-color: #0e0e12; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            color: #00ff96;
            font-family: sans-serif;
        }
        #status-container { text-align: center; }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #00ff96;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        canvas { 
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            display: none; 
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        #error-log {
            display: none;
            background: #1a0000;
            color: #ff6666;
            padding: 20px;
            border-radius: 10px;
            max-width: 80%;
            white-space: pre-wrap;
            font-family: monospace;
            border: 1px solid #440000;
        }
    </style>
</head>
<body>
    <div id="status-container">
        <div style="font-size: 24px; font-weight: bold; letter-spacing: 2px;">AUGMENT CHESS</div>
        <div style="font-size: 12px; opacity: 0.5; margin-bottom: 20px;">V13.0 PROFESSIONAL</div>
        <div class="spinner" id="loader"></div>
        <div id="status-text">엔진 초기화 중...</div>
    </div>

    <div id="error-log"></div>
    <canvas id="canvas"></canvas>

    <script type="text/javascript">
        async function main() {
            const status = document.getElementById('status-text');
            const errorLog = document.getElementById('error-log');
            const loader = document.getElementById('loader');
            const canvas = document.getElementById('canvas');

            try {
                // 1. Pyodide 초기 로드
                const pyodide = await loadPyodide();
                
                // 2. Pyodide 내장 pygame-ce 패키지 직접 로드 (micropip 미사용)
                status.innerText = "Pygame (Web Edition) 로드 중...";
                await pyodide.loadPackage("pygame-ce");

                // 3. 파이썬 파일 읽기 (사용자님의 원본 코드)
                status.innerText = "게임 코드 불러오는 중...";
                const response = await fetch('pygame_chess.py');
                if (!response.ok) throw new Error("pygame_chess.py 파일을 찾을 수 없습니다.");
                const pythonCode = await response.text();

                // 4. 웹 실행용 래퍼 (원본 코드 훼손 방지)
                const wrapper = `
import asyncio
import pygame
import sys
import io

# 폰트 에러 방지를 위한 더미 폰트 설정 (웹 환경 대응)
pygame.font.init()

# 원본 코드 실행
namespace = {}
try:
    exec("""${pythonCode.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\$/g, '\\$')}""", namespace)
except Exception as e:
    import traceback
    print(traceback.format_exc())
    raise e

async def run_loop():
    if 'GameApp' not in namespace:
        print("Error: GameApp class not found in your script.")
        return

    # 게임 앱 인스턴스 생성
    app = namespace['GameApp']()
    
    # 웹 브라우저 최적화 루프
    while True:
        app.draw()
        pygame.display.flip()
        
        for event in pygame.event.get():
            if event.type == pygame.QUIT:
                return
            app.handle_click(event)
        
        # 10ms 대기 (브라우저가 화면을 그릴 시간을 줌)
        await asyncio.sleep(0.01)

# 비동기 실행 시작
asyncio.ensure_future(run_loop())
`;

                // 파이썬 실행
                await pyodide.runPythonAsync(wrapper);

                // 화면 전환
                document.getElementById('status-container').style.display = 'none';
                canvas.style.display = 'block';
                canvas.id = "canvas"; // Pygame이 이 ID를 찾도록 보장

            } catch (err) {
                loader.style.display = 'none';
                status.innerText = "구동 실패";
                errorLog.style.display = 'block';
                errorLog.innerText = err.stack || err.message;
                console.error(err);
            }
        }

        window.onload = main;
    </script>
</body>
</html>
