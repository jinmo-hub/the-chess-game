<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUGMENT CHESS Web Runner</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        body { 
            background-color: #0e0e12; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            color: #00ff96;
            font-family: sans-serif;
        }
        #loading { margin-bottom: 20px; text-align: center; }
        canvas { 
            box-shadow: 0 0 50px rgba(0,0,0,0.9); 
            border-radius: 4px;
            background-color: #000;
        }
        .error-box {
            color: #ff4d4d;
            background: rgba(255,0,0,0.1);
            padding: 20px;
            border: 1px solid #ff4d4d;
            border-radius: 8px;
            display: none;
            max-width: 80%;
            white-space: pre-wrap;
            font-family: monospace;
            overflow-y: auto;
            max-height: 300px;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">AUGMENT CHESS</div>
        <div id="status">엔진 초기화 중...</div>
    </div>
    <div id="error" class="error-box"></div>
    <canvas id="canvas"></canvas>

    <script type="text/javascript">
        async function runGame() {
            const status = document.getElementById('status');
            const errorBox = document.getElementById('error');
            const loading = document.getElementById('loading');

            try {
                // 1. Pyodide 엔진 로드
                const pyodide = await loadPyodide();
                
                // 2. 패키지 로드 시도 (pygame-ce 대신 내장된 pygame 사용)
                status.innerText = "라이브러리 로드 중 (pygame)...";
                try {
                    await pyodide.loadPackage(["pygame"]);
                } catch (e) {
                    console.log("pygame 로딩 실패, micropip 시도 중...");
                    await pyodide.loadPackage("micropip");
                    const micropip = pyodide.pyimport("micropip");
                    await micropip.install("pygame");
                }

                // 3. 파이썬 파일 읽기 (파일명: pygame chess.py)
                status.innerText = "게임 스크립트 불러오는 중...";
                const response = await fetch('pygame chess.py');
                if (!response.ok) throw new Error("'pygame chess.py' 파일을 찾을 수 없습니다. 파일명이 정확한지 확인해 주세요.");
                const pythonCode = await response.text();

                // 4. 원본 코드를 실행하기 위한 래퍼
                // 사용자님의 GameApp 클래스를 찾아 웹용 루프를 돌립니다.
                const wrapper = `
import asyncio
import pygame
import sys

# 원본 코드 실행
exec_globals = {}
try:
    exec("""${pythonCode.replace(/\\\\/g, '\\\\\\\\').replace(/"/g, '\\\\\"').replace(/\\$/g, '\\\\$')}""", exec_globals)
except Exception as e:
    print(f"Python Error during exec: {e}")
    raise e

async def main():
    if 'GameApp' in exec_globals:
        # GameApp 인스턴스 생성
        app = exec_globals['GameApp']()
        
        # Pyodide/Web 최적화 루프
        while True:
            # 1. 그리기 호출
            app.draw()
            pygame.display.update()
            
            # 2. 이벤트 처리
            for event in pygame.event.get():
                if event.type == pygame.QUIT:
                    return
                # 원본 handle_click 호출
                app.handle_click(event)
            
            # 3. 브라우저가 화면을 갱신할 시간을 줌 (매우 중요)
            await asyncio.sleep(0)
    else:
        print("Error: 'GameApp' class not found in your script.")

# 비동기 루프 시작
asyncio.ensure_future(main())
`;
                await pyodide.runPythonAsync(wrapper);
                loading.style.display = 'none';

            } catch (err) {
                loading.style.display = 'none';
                errorBox.style.display = 'block';
                errorBox.innerText = "실행 에러 발생:\n" + err.message;
                console.error(err);
            }
        }
        window.onload = runGame;
    </script>
</body>
</html>
