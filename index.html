<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUGMENT CHESS Web Runner</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        body { 
            background-color: #0e0e12; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: #00ff96;
            font-family: 'Malgun Gothic', sans-serif;
        }
        #status-container { text-align: center; margin-bottom: 20px; }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #00ff96;
            animation: spin 1s linear infinite;
            margin: 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        canvas { border: 2px solid #333; box-shadow: 0 0 30px rgba(0,255,150,0.1); display: none; }
        #error-log {
            color: #ff4d4d;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 5px;
            display: none;
            max-width: 90%;
            font-size: 12px;
            white-space: pre-wrap;
            text-align: left;
        }
    </style>
</head>
<body>
    <div id="status-container">
        <div style="font-size: 20px; letter-spacing: 2px;">AUGMENT CHESS</div>
        <div class="spinner" id="loader"></div>
        <div id="status-text">파이썬 엔진 시동 중...</div>
    </div>
    <div id="error-log"></div>
    <canvas id="canvas"></canvas>

    <script type="text/javascript">
        async function start() {
            const status = document.getElementById('status-text');
            const errorLog = document.getElementById('error-log');
            const loader = document.getElementById('loader');
            const canvas = document.getElementById('canvas');

            try {
                // 1. Pyodide 로드
                const pyodide = await loadPyodide();
                
                // 2. 패키지 설치용 micropip 로드 (이건 공식 패키지라 무조건 됨)
                status.innerText = "패키지 관리자 준비 중...";
                await pyodide.loadPackage("micropip");
                
                // 3. micropip으로 직접 pygame-ce 설치 시도 (loadPackage 대신)
                status.innerText = "Pygame 엔진 설치 중 (약 30초 소요)...";
                await pyodide.runPythonAsync(`
                    import micropip
                    try:
                        await micropip.install("pygame-ce")
                        print("pygame-ce installed")
                    except Exception as e:
                        print(f"ce fail: {e}")
                        await micropip.install("pygame")
                `);

                // 4. 파이썬 코드 가져오기
                status.innerText = "게임 스크립트 로딩...";
                const res = await fetch('pygame chess.py');
                if (!res.ok) throw new Error("파일을 찾을 수 없습니다: pygame chess.py");
                const code = await res.ok ? await res.text() : "";

                // 5. 실행 및 브라우저 환경 싱크
                status.innerText = "게임 시작 준비 완료!";
                
                const wrapper = `
import asyncio
import pygame
import sys

# Pygame 초기화 (캔버스 타겟 지정)
pygame.init()

# 메인 코드 실행
namespace = {"__name__": "__main__"}
try:
    exec("""${code.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\$/g, '\\$')}""", namespace)
except Exception as e:
    import traceback
    print(traceback.format_exc())
    raise e

async def main_loop():
    if 'GameApp' not in namespace:
        print("GameApp 클래스를 찾을 수 없습니다.")
        return

    app = namespace['GameApp']()
    
    # 웹 환경 무한 루프
    while True:
        # 그리기
        app.draw()
        pygame.display.flip()
        
        # 이벤트 처리
        for event in pygame.event.get():
            if event.type == pygame.QUIT:
                return
            app.handle_click(event)
        
        # 브라우저에 제어권 양보 (필수)
        await asyncio.sleep(0.01)

# 실행
asyncio.ensure_future(main_loop())
`;
                await pyodide.runPythonAsync(wrapper);
                
                // UI 전환
                document.getElementById('status-container').style.display = 'none';
                canvas.style.display = 'block';

            } catch (e) {
                loader.style.display = 'none';
                status.innerText = "❌ 오류가 발생했습니다";
                errorLog.style.display = 'block';
                errorLog.innerText = e.message;
                console.error(e);
            }
        }
        window.onload = start;
    </script>
</body>
</html>
