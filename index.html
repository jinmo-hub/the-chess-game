<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUGMENT CHESS Web Runner</title>
    <!-- Pyodide 버전을 안정적인 버전으로 고정합니다 -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        body { 
            background-color: #0e0e12; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            color: #00ff96;
            font-family: 'Malgun Gothic', sans-serif;
        }
        #loading { margin-bottom: 20px; text-align: center; }
        canvas { 
            box-shadow: 0 0 50px rgba(0,0,0,0.9); 
            border-radius: 4px;
            background-color: #000;
        }
        .error-box {
            color: #ff4d4d;
            background: rgba(255,0,0,0.1);
            padding: 20px;
            border: 1px solid #ff4d4d;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">AUGMENT CHESS</div>
        <div id="status">엔진을 초기화하는 중...</div>
    </div>
    <div id="error" class="error-box"></div>
    <canvas id="canvas"></canvas>

    <script type="text/javascript">
        async function runGame() {
            const status = document.getElementById('status');
            const errorBox = document.getElementById('error');
            const loading = document.getElementById('loading');

            try {
                // 1. Pyodide 로드
                const pyodide = await loadPyodide();
                
                // 2. Pygame-ce 패키지 로드 (micropip 대신 공식 패키지 로더 사용)
                status.innerText = "Pygame 라이브러리를 불러오는 중...";
                await pyodide.loadPackage("pygame-ce");

                // 3. 파이썬 원본 파일 읽기
                status.innerText = "게임 스크립트를 로드하는 중...";
                const response = await fetch(encodeURIComponent('pygame_chess.py'));
                if (!response.ok) throw new Error("'pygame_chess.py' 파일을 찾을 수 없습니다.");
                const pythonCode = await response.text();

                // 4. 실행 래퍼 (원본 코드의 변수와 클래스를 그대로 유지)
                // 사용자님의 GameApp() 클래스와 handle_click() 구조를 그대로 활용합니다.
                const wrapper = `
import asyncio
import pygame
import sys
import io

# 원본 코드 주입 및 실행 (전역 공간 확보)
orig_globals = {}
exec("""${pythonCode.replace(/\\\\/g, '\\\\\\\\').replace(/"/g, '\\\\\"').replace(/\\$/g, '\\\\$')}""", orig_globals)

async def main():
    # 원본 코드의 GameApp 클래스 찾기
    if 'GameApp' in orig_globals:
        app = orig_globals['GameApp']()
        
        # 웹 환경을 위한 비동기 메인 루프
        # 원본의 draw()와 handle_click() 로직을 100% 보존하며 실행합니다.
        while True:
            app.draw()
            pygame.display.update()
            
            # 이벤트 처리
            for event in pygame.event.get():
                if event.type == pygame.QUIT:
                    return
                # 원본 클래스의 클릭 핸들러 호출
                app.handle_click(event)
            
            # 브라우저 렌더링을 위해 제어권 양보 (이게 없으면 멈춤)
            await asyncio.sleep(0)
    else:
        print("Error: 'GameApp' class not found in python script.")

# 비동기 루프 예약
asyncio.ensure_future(main())
`;
                await pyodide.runPythonAsync(wrapper);
                loading.style.display = 'none';

            } catch (err) {
                loading.style.display = 'none';
                errorBox.style.display = 'block';
                errorBox.innerHTML = "<strong>실행 오류 발생:</strong><br>" + err.message;
                console.error(err);
            }
        }

        // 페이지 로드 시 실행
        window.onload = runGame;
    </script>
</body>
</html>
