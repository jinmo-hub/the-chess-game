<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AUGMENT CHESS Web Runner</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        body { background-color: #141419; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #loading { color: #00ff96; font-family: sans-serif; position: absolute; }
    </style>
</head>
<body>
    <div id="loading">게임 데이터를 불러오는 중...</div>
    <canvas id="canvas"></canvas>

    <script type="text/javascript">
        async function runGame() {
            const pyodide = await loadPyodide();
            await pyodide.loadPackage(["pygame-ce"]);

            // 1. 같은 폴더에 있는 파이썬 파일을 읽어옵니다.
            const response = await fetch('pygame_chess.py');
            const pythonCode = await response.text();

            // 2. 브라우저에서 실행 가능하도록 래핑하여 실행합니다.
            const wrapper = `
import asyncio
import pygame

# 오리지널 코드 실행 환경 구축
exec_globals = {}
exec("""${pythonCode.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\$/g, '\\$')}""", exec_globals)

async def main():
    # 원본의 GameApp 인스턴스 생성 (사용자님 코드 구조 유지)
    if 'GameApp' in exec_globals:
        app = exec_globals['GameApp']()
        # 원본의 run() 대신 웹용 비동기 루프 실행
        while True:
            app.draw()
            pygame.display.update()
            await asyncio.sleep(0)
            for event in pygame.event.get():
                app.handle_click(event)
                if event.type == pygame.QUIT: return

asyncio.ensure_future(main())
`;
            await pyodide.runPythonAsync(wrapper);
            document.getElementById('loading').style.display = 'none';
        }
        runGame();
    </script>
</body>
</html>
