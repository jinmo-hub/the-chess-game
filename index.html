<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUGMENT CHESS Web Runner</title>
    <!-- Pyodide 안정 버전 사용 -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        body { 
            background-color: #0e0e12; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            color: #00ff96;
            font-family: sans-serif;
        }
        #loading { margin-bottom: 20px; text-align: center; }
        canvas { 
            box-shadow: 0 0 50px rgba(0,0,0,0.9); 
            border-radius: 4px;
            background-color: #000;
        }
        .error-box {
            color: #ff4d4d;
            background: rgba(255,0,0,0.1);
            padding: 20px;
            border: 1px solid #ff4d4d;
            border-radius: 8px;
            display: none;
            max-width: 80%;
            white-space: pre-wrap;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">AUGMENT CHESS</div>
        <div id="status">엔진 초기화 중...</div>
    </div>
    <div id="error" class="error-box"></div>
    <canvas id="canvas"></canvas>

    <script type="text/javascript">
        async function runGame() {
            const status = document.getElementById('status');
            const errorBox = document.getElementById('error');
            const loading = document.getElementById('loading');

            try {
                // 1. Pyodide 엔진 로드
                const pyodide = await loadPyodide();
                
                // 2. 오류의 핵심인 micropip 설치 과정을 건너뛰고 
                // Pyodide 내장 패키지 저장소에서 직접 pygame-ce를 불러옵니다.
                status.innerText = "라이브러리 로드 중 (pygame-ce)...";
                await pyodide.loadPackage(["pygame-ce"]);

                // 3. 파이썬 파일 읽기 (파일명: pygame chess.py)
                status.innerText = "게임 스크립트 불러오는 중...";
                const response = await fetch('pygame chess.py');
                if (!response.ok) throw new Error("'pygame chess.py' 파일을 찾을 수 없습니다.");
                const pythonCode = await response.text();

                // 4. 원본 코드를 변형 없이 실행하기 위한 래퍼
                const wrapper = `
import asyncio
import pygame
import sys

# 원본 코드 실행 (전역 공간 분리)
exec_globals = {}
try:
    # 사용자님의 코드를 그대로 실행
    exec("""${pythonCode.replace(/\\\\/g, '\\\\\\\\').replace(/"/g, '\\\\\"').replace(/\\$/g, '\\\\$')}""", exec_globals)
except Exception as e:
    print(f"Python Error: {e}")

async def main():
    # 원본의 GameApp 클래스가 있는지 확인
    if 'GameApp' in exec_globals:
        app = exec_globals['GameApp']()
        # 웹 환경을 위한 비동기 루프 (원본의 draw와 handle_click 호출)
        while True:
            app.draw()
            pygame.display.update()
            
            for event in pygame.event.get():
                if event.type == pygame.QUIT:
                    return
                app.handle_click(event)
            
            await asyncio.sleep(0) # 브라우저 응답성 유지
    else:
        print("Error: 'GameApp' class not found")

asyncio.ensure_future(main())
`;
                await pyodide.runPythonAsync(wrapper);
                loading.style.display = 'none';

            } catch (err) {
                loading.style.display = 'none';
                errorBox.style.display = 'block';
                errorBox.innerText = "실행 오류:\n" + err.message;
            }
        }
        window.onload = runGame;
    </script>
</body>
</html>
